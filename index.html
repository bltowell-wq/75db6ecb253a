<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>Family Schedule</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card-bg: #ffffff;
    --text-primary: #1c1c1e;
    --text-secondary: #8e8e93;
    --separator: rgba(60,60,67,0.12);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text-primary: #f2f2f7;
      --text-secondary: #8e8e93;
      --separator: rgba(84,84,88,0.6);
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 560px; margin: 0 auto; padding: env(safe-area-inset-top, 24px) 16px 40px; }
  header.hero { padding: 28px 4px 20px; }
  .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-secondary); text-transform: uppercase; margin: 0 0 4px; }
  h1.date { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .updated { margin-top: 6px; font-size: 13px; color: var(--text-secondary); }
  .kid-card { background: var(--card-bg); border-radius: 18px; box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
  .kid-card-header { display: flex; align-items: center; gap: 10px; padding: 16px 18px 10px; }
  .kid-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .kid-name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .kid-count { margin-left: auto; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .event-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 18px; border-top: 1px solid var(--separator); }
  .event-time { width: 68px; flex-shrink: 0; font-size: 13px; font-weight: 600; color: var(--text-secondary); padding-top: 1px; line-height: 1.3; }
  .event-time small { display: block; font-weight: 400; font-size: 11px; opacity: 0.8; }
  .event-body { flex: 1; min-width: 0; }
  .event-title { font-size: 15px; font-weight: 500; line-height: 1.35; }
  .event-location { font-size: 13px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .event-location svg { width: 11px; height: 11px; opacity: 0.7; }
  .empty-state { padding: 22px 18px 24px; font-size: 14px; color: var(--text-secondary); border-top: 1px solid var(--separator); }
  footer { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 28px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">Family Schedule</p>
      <h1 class="date">Sunday, July 19</h1>
      <p class="updated">Updated 7:00 AM</p>
    </header>

    <section class="kid-card">
      <div class="kid-card-header">
        <span class="kid-dot" style="background:#ff375f;"></span>
        <span class="kid-name">Arlo</span>
        <span class="kid-count">No events</span>
      </div><div class="empty-state">Nothing on the calendar today 🎉</div>
    </section>

    <section class="kid-card">
      <div class="kid-card-header">
        <span class="kid-dot" style="background:#0a84ff;"></span>
        <span class="kid-name">Ayven</span>
        <span class="kid-count">No events</span>
      </div><div class="empty-state">Nothing on the calendar today 🎉</div>
    </section>

    <section class="kid-card">
      <div class="kid-card-header">
        <span class="kid-dot" style="background:#30d158;"></span>
        <span class="kid-name">Arya</span>
        <span class="kid-count">No events</span>
      </div><div class="empty-state">Nothing on the calendar today 🎉</div>
    </section>
    <footer>Generated automatically every morning</footer>
  </div>
</body>
</html>
